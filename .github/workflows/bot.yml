name: Crypto Bot

on:
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install dependencies
        run: |
          pip install numpy pandas requests aiohttp ccxt python-binance ta pyTelegramBotAPI dateparser cryptography

      # 🔍 Debug env (درست و مطمئن)
      - name: Debug environment variables
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: |
          python -c "import os; print('TOKEN OK:', bool(os.getenv('TELEGRAM_TOKEN'))); print('CHAT OK:', bool(os.getenv('CHAT_ID')))"

      # 🚀 Run bot
      - name: Run bot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python main.py
